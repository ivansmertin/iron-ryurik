name: Diary Reminders Cron

on:
  schedule:
    # Trigger every 15 minutes
    - cron: '*/15 * * * *'
  # Allow manual trigger from GitHub UI
  workflow_dispatch:

jobs:
  run-cron:
    runs-on: ubuntu-latest
    steps:
      - name: Call API
        run: |
          curl -f -s -X GET \
            -H "Authorization: Bearer ${{ secrets.CRON_SECRET }}" \
            ${{ secrets.NEXT_PUBLIC_APP_URL }}/api/cron/diary-reminders
